<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="wave" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#00C97E"/>
      <stop offset="0.58" stop-color="#00E6A8"/>
      <stop offset="1" stop-color="#63F5C9"/>
    </linearGradient>
    <filter id="waveGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="512" cy="512" r="318" fill="#0C1117" stroke="#242D37" stroke-width="24"/>
    <circle cx="512" cy="512" r="280" fill="none" stroke="#303A45" stroke-width="58" stroke-linecap="round"
      stroke-dasharray="1319 440" transform="rotate(135 512 512)"/>

    <path d="M300 724 A300 300 0 0 1 240 385" fill="none" stroke="#00C96B" stroke-width="58" stroke-linecap="butt"/>
    <path d="M240 385 A300 300 0 0 1 434 222" fill="none" stroke="#76D900" stroke-width="58" stroke-linecap="butt"/>
    <path d="M434 222 A300 300 0 0 1 662 252" fill="none" stroke="#F0C400" stroke-width="58" stroke-linecap="butt"/>
    <path d="M662 252 A300 300 0 0 1 802 434" fill="none" stroke="#FF9F0A" stroke-width="58" stroke-linecap="butt"/>
    <path d="M802 434 A300 300 0 0 1 724 724" fill="none" stroke="#FF4055" stroke-width="58" stroke-linecap="butt"/>

    <g stroke="#EAF0F5" stroke-width="18" stroke-linecap="round">
      <path d="M285 696 L318 662"/>
      <path d="M269 397 L313 414"/>
      <path d="M446 242 L454 288"/>
      <path d="M650 273 L634 316"/>
      <path d="M770 440 L727 451"/>
      <path d="M704 694 L671 660"/>
    </g>

    <path d="M298 436 L358 446 L329 499 Z" fill="#F8FAFC"/>

    <g fill="url(#wave)" filter="url(#waveGlow)">
      <rect x="349" y="459" width="54" height="106" rx="27"/>
      <rect x="429" y="397" width="54" height="230" rx="27"/>
      <rect x="509" y="329" width="54" height="366" rx="27"/>
      <rect x="589" y="397" width="54" height="230" rx="27"/>
      <rect x="669" y="459" width="54" height="106" rx="27"/>
    </g>

    <circle cx="512" cy="512" r="22" fill="#F8FAFC"/>
  </g>
</svg>
